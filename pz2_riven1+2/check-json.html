<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Перевірка JSON</title>
</head>
<body>
  <h1>Перевірка JSON</h1>

  <textarea id="jsonInput" rows="10" cols="60">
{"name": "Давид", "age": 19}
  </textarea>
  <br><br>

  <button id="checkBtn">Перевірити</button>

  <p id="result"></p>

  <script>
    const input = document.getElementById('jsonInput');
    const result = document.getElementById('result');
    const button = document.getElementById('checkBtn');

    button.addEventListener('click', () => {
      const text = input.value;

      try {
        JSON.parse(text);
        result.textContent = 'Дійсний JSON';
        result.style.color = 'green';
      } catch (error) {
        result.textContent = 'Недійсний JSON';
        result.style.color = 'red';
      }
    });
  </script>
</body>
</html>
