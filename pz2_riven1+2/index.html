<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Дані про себе</title>
</head>
<body>
  <h1>Інформація про мене</h1>
  <div id="output"></div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    fetch('data.json')
      .then(response => response.text())
      .then(text => {
        const data = JSON.parse(text);
        const output = document.getElementById('output');

        const name = document.createElement('p');
        name.textContent = `Ім'я: ${data.name}`;

        const age = document.createElement('p');
        age.textContent = `Вік: ${data.age}`;

        const hobbiesTitle = document.createElement('p');
        hobbiesTitle.textContent = 'Хобі:';

        const list = document.createElement('ul');
        data.hobbies.forEach(hobby => {
          const li = document.createElement('li');
          li.textContent = hobby;
          list.appendChild(li);
        });

        output.appendChild(name);
        output.appendChild(age);
        output.appendChild(hobbiesTitle);
        output.appendChild(list);
      })
      .catch(error => {
        console.log('Помилка:', error);
      });
  });
</script>
</body>
</html>
